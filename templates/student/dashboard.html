<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/css/darkmode.css">
    <script src="/js/darkmode.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySync — Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#7C3AED">
</head>
<body>

<div class="shell">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <div class="logo-icon"><i class="ti ti-bolt"></i></div>
        </div>
        <nav class="nav">
            <a href="/student/dashboard" class="ni on" title="Dashboard"><i class="ti ti-layout-dashboard"></i></a>
            <a href="/student/tasks"     class="ni"   title="My Tasks"><i class="ti ti-clipboard-list"></i></a>
            <a href="/student/planner"   class="ni"   title="Planner"><i class="ti ti-calendar"></i></a>
            <a href="/student/pomodoro"  class="ni"   title="Pomodoro"><i class="ti ti-clock"></i></a>
        </nav>
        <div class="nav-bottom">
            <a href="/logout"   class="ni" title="Logout"><i class="ti ti-logout"></i></a>
            <div class="uav" id="userAvatar">?</div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="topbar">
            <div>
                <div class="greeting" id="greeting">Good morning 👋</div>
                <div class="subdate" id="subdate">Loading...</div>
            </div>
            <button id="darkModeToggle" class="dark-toggle" onclick="toggleDarkMode()" title="Toggle dark mode">
                <i class="ti ti-moon"></i>
            </button>
        </div>

        <!-- BODY -->
        <div class="body">

            <!-- STAT CARDS -->
            <div class="stats">
                <div class="sc sc-purple">
                    <div class="sc-icon"><i class="ti ti-clipboard-list"></i></div>
                    <div class="sc-num" id="statTotal">—</div>
                    <div class="sc-lbl">Total tasks</div>
                </div>
                <div class="sc sc-green">
                    <div class="sc-icon"><i class="ti ti-circle-check"></i></div>
                    <div class="sc-num" id="statCompleted">—</div>
                    <div class="sc-lbl">Completed</div>
                </div>
                <div class="sc sc-amber">
                    <div class="sc-icon"><i class="ti ti-clock"></i></div>
                    <div class="sc-num" id="statDueSoon">—</div>
                    <div class="sc-lbl">Due soon</div>
                </div>
                <div class="sc sc-red">
                    <div class="sc-icon"><i class="ti ti-alert-circle"></i></div>
                    <div class="sc-num" id="statOverdue">—</div>
                    <div class="sc-lbl">Overdue</div>
                </div>
            </div>

            <!-- TASKS + PROGRESS -->
            <div class="row2">

                <!-- RECENT TASKS -->
                <div class="card">
                    <div class="ctitle">
                        <div class="ctitle-left"><i class="ti ti-clipboard-check"></i> Recent tasks</div>
                        <a href="/student/tasks" class="viewall">View all →</a>
                    </div>
                    <div id="tasksList">
                        <div class="loading">Loading tasks...</div>
                    </div>
                </div>

                <!-- PROGRESS BY SUBJECT -->
                <div class="card">
                    <div class="ctitle">
                        <div class="ctitle-left"><i class="ti ti-chart-bar"></i> By subject</div>
                    </div>
                    <div id="subjectBars">
                        <div class="loading">Loading...</div>
                    </div>
                </div>

            </div>

            <!-- UPCOMING DEADLINES -->
            <div class="card">
                <div class="ctitle">
                    <div class="ctitle-left"><i class="ti ti-calendar-event"></i> Upcoming deadlines</div>
                    <a href="/student/planner" class="viewall">View calendar →</a>
                </div>
                <div class="deadlines" id="deadlinesList">
                    <div class="loading">Loading...</div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="/js/dashboard.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')
            .then(() => console.log('Service worker registered'))
            .catch(err => console.log('SW error:', err))
    }
</script>
</body>
</html>
